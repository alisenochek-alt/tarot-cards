<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказать карты - Мир Таро</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="order-page">
    <div class="form-container">
        <h2>Индивидуальный заказ</h2>
        <p>Опишите колоду вашей мечты</p>
        
        <form id="orderForm">
            <select id="orderType">
                <option value="full">Полная колода (78 карт)</option>
                <option value="major">Старшие Арканы (22 карты)</option>
                <option value="single">Одна карта-талисман</option>
            </select>
            <textarea id="orderDesc" placeholder="Например: стиль киберпанк, темные тона..." required></textarea>
            <button type="submit" class="btn" id="submitBtn">Отправить заказ</button>
        </form>

        <div id="successMsg" style="display: none; color: #d4af37; margin-top: 20px;">
            <h3>✨ Заказ принят! ✨</h3>
            <p>Мастера уже начали работу над вашими картами.</p>
            <a href="index.html" class="btn-small">Вернуться на главную</a>
        </div>
    </div>

    <script>
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Скрываем форму, чтобы она не мешала
            document.getElementById('orderForm').style.display = 'none';
            // Показываем красивое сообщение об успехе
            document.getElementById('successMsg').style.display = 'block';
            
            console.log("Заказ зафиксирован в системе.");
        });
    </script>
</body>
</html>
